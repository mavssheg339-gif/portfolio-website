<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Gallery</h1>
    </header>
    <main>
        <section class="gallery">
            <h2>Photo Gallery</h2>
            <div class="filters">
                <button data-filter="*">Show All</button>
                <button data-filter=".nature">Nature</button>
                <button data-filter=".architecture">Architecture</button>
            </div>
            <div class="gallery-grid">
                <figure class="gallery-item nature">
                    <a href="images/nature1.jpg" data-lightbox="gallery" aria-label="View nature image 1">
                        <img src="images/nature1.jpg" alt="Beautiful nature scenery" loading="lazy">
                    </a>
                    <figcaption>Nature Image 1</figcaption>
                </figure>
                <figure class="gallery-item architecture">
                    <a href="images/architecture1.jpg" data-lightbox="gallery" aria-label="View architecture image 1">
                        <img src="images/architecture1.jpg" alt="Stunning architecture example" loading="lazy">
                    </a>
                    <figcaption>Architecture Image 1</figcaption>
                </figure>
                <!-- More images can be added similarly -->
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Gallery. All rights reserved.</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
